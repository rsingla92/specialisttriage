{% extends "base.html" %}
{% block title %}Login – SpecialistTriage BC{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow-sm mt-5">
      <div class="card-body p-4">
        <h2 class="card-title text-center mb-1 fw-bold">
          <i class="bi bi-clipboard2-pulse-fill text-primary me-2"></i>SpecialistTriage
        </h2>
        <p class="text-center text-muted small mb-4">BC Specialist Referral Portal</p>

        <form method="post" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" name="email" required autofocus>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
          </div>
          <div class="mb-3 form-check">
            <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
            <label class="form-check-label" for="remember_me">Remember me</label>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Log In
          </button>
        </form>

        <hr>
        <p class="text-center mb-0 small">
          New specialist?
          <a href="{{ url_for('auth.register') }}">Create an account</a>
        </p>
      </div>
    </div>

    <p class="text-center text-muted small mt-3">
      <strong>Demo credentials:</strong> demo@example.com / password123
    </p>
  </div>
</div>
{% endblock %}
