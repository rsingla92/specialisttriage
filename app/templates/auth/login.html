{% extends "base.html" %}
{% block title %}Login – ReferralQ{% endblock %}

{% block content %}
<div class="rq-auth-page">
  <div class="rq-auth-container">
    <div class="rq-auth-card">
      <div class="rq-auth-brand">
        <div class="rq-brand-icon">
          <img src="{{ url_for('static', filename='img/logo-icon.svg') }}" alt="" height="20">
        </div>
        <span class="rq-brand-name">ReferralQ</span>
      </div>
      <p class="rq-auth-subtitle">BC Specialist Referral Portal</p>

      <form method="post" novalidate>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input type="email" class="form-control" id="email" name="email" required autofocus
                 placeholder="you@clinic.ca">
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input type="password" class="form-control" id="password" name="password" required>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
          <label class="form-check-label" for="remember_me" style="font-size: 13px;">Remember me</label>
        </div>
        <button type="submit" class="btn btn-primary w-100">
          Log In
        </button>
      </form>

      <hr class="rq-auth-divider">
      <p class="rq-auth-footer">
        New specialist? <a href="{{ url_for('auth.register') }}">Create an account</a>
      </p>
    </div>

    <div class="rq-auth-note">
      <strong>Demo:</strong> demo@example.com<br>
      Run <code>flask seed-demo</code> for the password
    </div>
  </div>
</div>
{% endblock %}
